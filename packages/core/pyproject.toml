[project]
name = "hypex-core"
version = "0.1.0"
description = "Shared core for HypeX: registry, resolver, types"
requires-python = ">=3.11"
dependencies = [
    "rapidfuzz>=3.0.0",
    "psycopg[binary]>=3.2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "ruff>=0.8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hypex_core"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
